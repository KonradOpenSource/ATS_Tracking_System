services:
  postgres:
    image: postgres:15
    platform: linux/amd64
    container_name: ats-postgres
    environment:
      POSTGRES_DB: ats_db
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: ats_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ats-network

  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ats-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ats_db
      SPRING_DATASOURCE_USERNAME: ats_user
      SPRING_DATASOURCE_PASSWORD: ats_password
      ATS_CV_UPLOAD_DIR: ./uploads/cv
      ATS_AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      - postgres
      - ai-service
    volumes:
      - ./uploads:/app/uploads
    networks:
      - ats-network

  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ats-frontend
    ports:
      - "81:80"
    depends_on:
      - backend
    networks:
      - ats-network

  ai-service:
    platform: linux/amd64
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ats-ai-service
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service/uploads:/app/uploads
    networks:
      - ats-network

volumes:
  postgres_data:

networks:
  ats-network:
    driver: bridge
