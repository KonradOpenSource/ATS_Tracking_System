spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

  security:
    jwt:
      secret: test-jwt-secret-key-for-testing-only-32-chars
      expiration: 3600000
      refresh:
        secret: test-refresh-secret-key-for-testing-only-32-chars
        expiration: 604800000

rate:
  limit:
    enabled: false 

ats:
  cv:
    upload-dir: ./test-uploads/cv
  ai:
    service-url: http://localhost:8000

logging:
  level:
    com.ats: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
